syntax = "proto3";

package node_registry;

// NodeRegistry manages compute/service nodes in a distributed cluster.
service NodeRegistry {
  rpc Register(RegisterRequest) returns (NodeResponse);
  rpc List(Empty)              returns (NodeList);
  rpc Get(GetRequest)          returns (NodeResponse);
  rpc Delete(DeleteRequest)    returns (Empty);
}

message Empty {}

message RegisterRequest {
  string name    = 1;
  string address = 2;
  int32  port    = 3;
}

message GetRequest {
  string id = 1;
}

message DeleteRequest {
  string id = 1;
}

message Node {
  string id      = 1;
  string name    = 2;
  string address = 3;
  int32  port    = 4;
  string status  = 5;
}

message NodeResponse {
  Node node = 1;
}

message NodeList {
  repeated Node nodes = 1;
}
